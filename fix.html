<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إصلاح Fire Gym 🛠️</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 50px 20px; }
        .btn { background: #e53935; color: #fff; border: none; padding: 20px; border-radius: 15px; font-size: 20px; font-weight: bold; cursor: pointer; width: 100%; max-width: 300px; }
    </style>
</head>
<body>
    <h1 style="color: #ffb300;">جاري تنظيف التطبيق... 🔥</h1>
    <p>لو الأبلكيشن بيطلع رموز غريبة أو بيدي 500، الزرار ده هيمسح كل المشاكل.</p>
    <button class="btn" onclick="fixAll()">إصلاح الآن ✅</button>
    <div id="status" style="margin-top: 20px; color: #4caf50; font-weight: bold;"></div>

    <script>
        async function fixAll() {
            document.getElementById('status').innerText = 'جاري المسح... ⏳';
            
            // 1. مسح الـ Service Workers
            if ('serviceWorker' in navigator) {
                const regs = await navigator.serviceWorker.getRegistrations();
                for (let reg of regs) await reg.unregister();
            }

            // 2. مسح الكاش
            if ('caches' in window) {
                const keys = await caches.keys();
                for (let key of keys) await caches.delete(key);
            }

            // 3. مسح الذاكرة المحلية
            localStorage.clear();
            sessionStorage.clear();

            document.getElementById('status').innerText = 'تم التنظيف بنجاح! 🚀 افتح الأبلكيشن دلوقتي.';
            setTimeout(() => {
                window.location.href = 'index.html?v=' + Date.now();
            }, 2000);
        }
    </script>
</body>
</html>
