<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fire Gym | Smart App</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <!-- التحميل السريع لمكتبات جوجل -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e53935; --bg: #121212; --surface: #1e1e1e; --text: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); }
        #auth-screen { height: 100vh; display: flex; align-items: center; justify-content: center; background: url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=800') center/cover; padding: 20px; }
        .card { background: var(--surface); padding: 30px; border-radius: 20px; text-align: center; width: 100%; max-width: 400px; border: 1px solid #444; }
        input { width: 100%; padding: 15px; margin: 20px 0; border-radius: 10px; border: none; background: #000; color: #fff; text-align: center; font-size: 18px; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--primary); color: #fff; font-weight: 900; font-size: 18px; }
        #app-content { display: none; padding-bottom: 80px; }
        .content-tab { padding: 20px; }
        .hidden { display: none; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #1e1e1e; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #333; }
        .nav-item { color: #888; text-decoration: none; font-size: 12px; text-align: center; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="card">
            <h1 style="color: var(--primary); font-size: 40px;">FIRE GYM</h1>
            <input type="tel" id="login-phone" placeholder="اكتب رقم موبايلك">
            <button class="btn" onclick="easyLogin()">دخول للأرض 🔥</button>
        </div>
    </div>

    <div id="app-content">
        <div style="background: #1e1e1e; padding: 40px 20px; text-align: center; border-bottom: 2px solid var(--primary);">
            <h2 id="welcome-msg">مرحباً بطل فاير 👋</h2>
        </div>
        
        <div class="content-tab">
            <div class="card" style="max-width: 100%; margin-bottom: 20px; background: linear-gradient(45deg, #1e1e1e, #b71c1c);">
                <h3>متابع المية 💧</h3>
                <h1 id="w-count" style="font-size: 50px;">0</h1>
                <button class="btn" onclick="addW()" style="background: rgba(255,255,255,0.2);">+1 كوب</button>
            </div>
            
            <div class="card" style="max-width: 100%;">
                <h3>سجل بيانتاتك 📈</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px;">
                    <button class="btn" style="background:#333;" onclick="alert('جاري التفعيل..')">⚖️ وزن</button>
                    <button class="btn" style="background:#333;" onclick="alert('جاري التفعيل..')">🥗 أكل</button>
                </div>
            </div>
        </div>

        <div class="bottom-nav">
            <a href="#" class="nav-item active">🏠<br>حسابي</a>
            <a href="#" class="nav-item">🎓<br>التكنيك</a>
            <a href="#" id="admin-link" class="nav-item hidden">👑<br>الأدمن</a>
        </div>
    </div>

    <script>
        const ADMIN = "01100896637";
        let w = 0;

        function easyLogin() {
            const p = document.getElementById('login-phone').value.trim();
            if (p.length < 10) { alert('الرقم ناقص يا بطل!'); return; }
            
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            
            if (p === ADMIN) {
                document.getElementById('admin-link').classList.remove('hidden');
                document.getElementById('welcome-msg').innerText = "يا مرحب بـ كابتن أحمد 🦁";
            }
        }

        function addW() { w++; document.getElementById('w-count').innerText = w; }
    </script>

</body>
</html>
