<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fire Gym | Smart App</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e53935; --bg: #121212; --surface: #1e1e1e; --text: #fff; --accent: #ffb300; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }
        #auth-screen { height: 100vh; display: flex; align-items: center; justify-content: center; background: #121212; padding: 20px; }
        .card { background: var(--surface); padding: 30px; border-radius: 20px; text-align: center; border: 1px solid #333; width: 100%; max-width: 400px; }
        input { width: 100%; padding: 15px; margin: 20px 0; border-radius: 12px; border: none; background: #000; color: #fff; text-align: center; font-size: 18px; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--primary); color: #fff; font-weight: 900; font-size: 18px; cursor: pointer; }
        #app-content { display: none; }
        .top-header { background: #1e1e1e; padding: 40px 20px; text-align: center; border-bottom: 3px solid var(--primary); }
    </style>
</head>
<body>
    <div id="auth-screen">
        <div class="card">
            <h1 style="color: var(--primary); font-size: 40px;">FIRE GYM</h1>
            <input type="tel" id="login-phone" placeholder="اكتب رقم موبايلك">
            <button class="btn" onclick="login()">دخول للأرض 🔥</button>
        </div>
    </div>
    <div id="app-content">
        <div class="top-header">
            <h2>مرحباً بطل فاير 👋</h2>
        </div>
        <div style="padding: 20px; text-align: center;">
            <div class="card" style="background: linear-gradient(45deg, #1e1e1e, #b71c1c);">
                <h3>عداد المية 💧</h3>
                <h1 id="w-count">0</h1>
                <button class="btn" onclick="addW()" style="background: rgba(255,255,255,0.2);">+1 كوب</button>
            </div>
        </div>
    </div>
    <script>
        let w = 0;
        function login() {
            const p = document.getElementById('login-phone').value;
            if (p.length < 10) return alert('الرقم ناقص يا بطل!');
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
        }
        function addW() { w++; document.getElementById('w-count').innerText = w; }
    </script>
</body>
</html>
