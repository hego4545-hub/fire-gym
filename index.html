<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fire Gym | Final Fix</title>
    <!-- قنبلة تنظيف الداتا -Nuclear Clean- -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) { registration.unregister(); }
            });
        }
        caches.keys().then(function(names) {
            for (let name of names) caches.delete(name);
        });
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e53935; --bg: #000; --card: #151515; --text: #fff; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Cairo', sans-serif; }
        body { background:var(--bg); color:var(--text); padding-bottom:100px; }
        .page { display:none; } .page.active { display:block; }
        .card { background:var(--card); margin:15px; padding:20px; border-radius:20px; border:1px solid #333; }
        nav { position:fixed; bottom:0; width:100%; display:flex; background:#111; padding:15px 0 30px; border-top:1px solid #222; }
        .nav-item { flex:1; text-align:center; color:#555; font-size:12px; }
        .nav-item.active { color:var(--primary); }
    </style>
</head>
<body>
    <div id="login" style="height:100vh; display:flex; align-items:center; justify-content:center; text-align:center;">
        <div style="width:100%; padding:30px;">
            <h1 style="color:var(--primary); font-size:45px;">FIRE GYM</h1>
            <input type="tel" id="u-p" placeholder="رقم الموبايل" style="width:100%; padding:15px; border-radius:15px; margin:20px 0; background:#222; color:#fff; border:none; text-align:center;">
            <button onclick="login()" style="width:100%; padding:15px; border-radius:15px; background:var(--primary); color:#fff; font-weight:900; border:none;">دخول 🔥</button>
        </div>
    </div>

    <div id="main" style="display:none;">
        <div id="p-home" class="page active">
            <header style="padding:40px 20px;"><h1>أهلاً يا <span>بطل</span> 👋</h1></header>
            <div class="card"><h3>جدول التمرين الحالي 🏋️</h3><p style="color:#666; font-size:12px;">سيتم تحديث جدولك بواسطة الكابتن.</p></div>
            <div class="card" style="background:#0d47a1;">💧 متابع المية <h2 id="w-c" style="font-size:40px;">0</h2><button onclick="addW()" style="width:100%; padding:10px; border-radius:10px; background:#111; color:#fff; border:none; margin-top:10px;">+1 كوب</button></div>
        </div>
        <div id="p-tech" class="page">
            <h2 style="padding:20px;">🎓 التكنيك الصحيح</h2>
            <div style="padding:20px;">
                <iframe width="100%" height="200" src="https://www.youtube.com/embed/1O72k07a0Gk" style="border-radius:15px;"></iframe>
            </div>
        </div>
        <nav><div class="nav-item active" onclick="sh('home')">🏠 حسابي</div><div class="nav-item" onclick="sh('tech')">🎓 التكنيك</div></nav>
    </div>

    <script>
        function login() { if(document.getElementById('u-p').value.length<10) return; document.getElementById('login').style.display='none'; document.getElementById('main').style.display='block'; }
        function sh(n) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById('p-'+n).classList.add('active'); document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active')); event.currentTarget.classList.add('active'); }
        let w=0; function addW() { w++; document.getElementById('w-c').innerText=w; }
    </script>
</body>
</html>
