<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fire Gym | Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e53935; --bg: #111; --card-bg: #1c1c1c; --text: #fff; --accent: #ffb300; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 100px; }

        header { padding: 40px 20px; text-align: center; }
        header h1 { font-size: 26px; font-weight: 900; }
        header span { color: var(--accent); }

        .section-title { padding: 20px 20px 10px; font-size: 18px; font-weight: bold; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; }
        .action-card { background: var(--card-bg); padding: 25px 15px; border-radius: 20px; text-align: center; border: 1px solid #333; }
        .action-card i { display: block; font-size: 30px; margin-bottom: 5px; }

        .schedule-card { background: #1c1c1c; margin: 15px 20px; padding: 20px; border-radius: 20px; border: 1px solid #333; }
        .water-section { margin: 25px 20px; background: #0d47a1; border-radius: 20px; overflow: hidden; }
        .water-body { background: var(--card-bg); padding: 25px; text-align: center; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 15px 0 30px; border-top: 1px solid #222; z-index: 100; }
        .nav-item { color: #555; text-decoration: none; text-align: center; font-size: 12px; cursor: pointer; }
        .nav-item.active { color: var(--primary); }

        .page { display: none; }
        .page.active { display: block; }
        
        iframe { width: 100%; border-radius: 15px; margin-bottom: 15px; border: 1px solid #333; }
        #login-screen { height: 100vh; display: flex; align-items: center; justify-content: center; background: #000; position: fixed; width: 100%; top: 0; z-index: 2000; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--primary); color: #fff; font-weight: 900; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div style="text-align: center; width: 100%; padding: 30px;">
            <h1 style="color: var(--primary); font-size: 45px; margin-bottom: 10px;">FIRE GYM</h1>
            <input type="tel" id="user-phone" placeholder="رقم موبايلك">
            <button onclick="doLogin()" class="btn">دخول للأرض 🔥</button>
        </div>
    </div>

    <div id="main-content" style="display: none;">
        <!-- Page: Home -->
        <div id="page-home" class="page active">
            <header><h1>يا مرحب بـ <span>بطلنا</span> 👋</h1></header>
            <div class="section-title">📊 أداؤك النهاردة</div>
            <div class="grid-container">
                <div class="action-card" onclick="alert('سجل الوزن سيتم تفعيله')"><i>⚖️</i><p>سجل الوزن</p></div>
                <div class="action-card" onclick="alert('سجل الأكل سيتم تفعيله')"><i>🥗</i><p>سجل الأكل</p></div>
            </div>
            <div class="schedule-card">
                <h3 style="margin-bottom: 5px;">جدول تمرينك الحالي 🏋️</h3>
                <p style="color: #666; font-size: 12px;">سيتم تحديث جدولك بواسطة الكابتن بنهاية الأسبوع.</p>
            </div>
            <div class="water-section">
                <div style="padding:10px 15px;">💧 متابع المية <span id="w-percent" style="float:left;">0%</span></div>
                <div class="water-body"><h2 id="w-count" style="font-size: 40px;">0</h2><button onclick="addW()" class="btn" style="background:#222;">+1 كوب</button></div>
            </div>
        </div>

        <!-- Page: Technique -->
        <div id="page-tech" class="page">
            <div class="section-title">🎬 تكنيك التمارين (فيديو)</div>
            <div style="padding: 20px;">
                <p style="margin-bottom: 15px; color: var(--accent);">شرح صحيح لأهم الحركات:</p>
                <iframe height="200" src="https://www.youtube.com/embed/1O72k07a0Gk" title="Squat Guide"></iframe>
                <iframe height="200" src="https://www.youtube.com/embed/xS2wK_-m764" title="Push up Guide"></iframe>
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="showP('home')">🏠 حسابي</div>
            <div class="nav-item" onclick="showP('tech')">🎓 التكنيك</div>
        </nav>
    </div>

    <script>
        const firebaseConfig = { projectId: "fire-gym-9c753" }; 
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let u = "";
        let w = 0;

        function doLogin() {
            const p = document.getElementById('user-phone').value;
            if(p.length < 10) return;
            u = p;
            document.getElementById('login-screen').style.display = "none";
            document.getElementById('main-content').style.display = "block";
        }

        function showP(name) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + name).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if(name==='home') document.querySelector('.nav-item:first-child').classList.add('active');
            else document.querySelector('.nav-item:last-child').classList.add('active');
        }

        function addW() {
            w++;
            document.getElementById('w-count').innerText = w;
            document.getElementById('w-percent').innerText = Math.min(w*10, 100) + "%";
        }
    </script>
</body>
</html>
